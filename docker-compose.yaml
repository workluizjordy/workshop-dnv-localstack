services:
  localstack:
    container_name: localstack_main
    image: localstack/localstack:latest
    user: "1000:1000" 
    ports:
      - "4510-4559:4510-4559"
      - "4566:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=ls-tAwaqOdI-hOlA-jANI-2712-HOGozuLa1f3c
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      # MUDANÇA AQUI: Garante que ele use o diretório de volume para TUDO
      - PERSISTENCE=1
      - LOCALSTACK_DATA_DIR=/var/lib/localstack
    volumes:
      # MAPEAMENTO MAIS ABRANGENTE
    # - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - localstack-net

networks:
  localstack-net:
    driver: bridge